  <!-- ===== STRUCTURED DATA: FAQPage ===== -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      {
        "@type": "Question",
        "name": "¿Qué tipos de archivos puedo subir a Ankard?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Ankard admite PDFs, documentos de texto y apuntes. Puedes organizarlos en proyectos y temas para generar preguntas específicas por cada área."
        }
      },
      {
        "@type": "Question",
        "name": "¿Cómo genera Ankard las preguntas con IA?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Ankard analiza el contenido de tus documentos y genera automáticamente preguntas de opción múltiple, verdadero/falso y flashcards usando inteligencia artificial, adaptadas al tema y nivel de dificultad que configures."
        }
      },
      {
        "@type": "Question",
        "name": "¿Es gratuito Ankard?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Sí, Ankard tiene un plan gratuito que incluye proyectos básicos y preguntas de práctica diaria. Los planes Premium y Pro Team ofrecen proyectos ilimitados, práctica sin límite y funciones avanzadas."
        }
      },
      {
        "@type": "Question",
        "name": "¿Puedo simular un examen real con Ankard?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Sí. Ankard incluye un simulador de examen que replica las condiciones reales: tiempo limitado, puntuación y revisión detallada de resultados por tema."
        }
      },
      {
        "@type": "Question",
        "name": "¿En qué idiomas está disponible Ankard?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Ankard está disponible en español e inglés. Puedes cambiar el idioma desde tu perfil en cualquier momento."
        }
      }
    ]
  }
  </script>
